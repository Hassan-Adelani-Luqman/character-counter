<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ====== HEADER ====== -->
    <header class="header">
      <a href="#" class="header__logo-link" aria-label="Character Counter home">
        <img
          id="logo"
          src="assets/logos/white-logo.png"
          alt="Character Counter"
          class="header__logo"
          width="142"
          height="28"
        />
      </a>
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Switch to light mode"
        title="Toggle theme"
      >
        <img
          id="theme-icon"
          src="assets/icons/moon-02.svg"
          alt=""
          aria-hidden="true"
          width="22"
          height="22"
        />
      </button>
    </header>

    <!-- ====== MAIN ====== -->
    <main class="main">
      <!-- Heading -->
      <h1 class="heading">Analyze your text in&nbsp;real&#8209;time.</h1>

      <!-- Textarea -->
      <div class="textarea-wrapper">
        <textarea
          id="text-input"
          class="textarea"
          placeholder="Start typing here... (or paste your text)"
          aria-label="Text input for analysis"
          spellcheck="true"
        ></textarea>
        <!-- Character limit warning -->
        <div id="limit-warning" class="limit-warning" hidden>
          <img
            src="assets/icons/info-circle.svg"
            alt=""
            aria-hidden="true"
            width="20"
            height="20"
          />
          <span id="limit-warning-text">Limit reached! Your text exceeds 300 characters.</span>
        </div>
      </div>

      <!-- Options + Reading time bar -->
      <div class="options-bar">
        <div class="options">
          <!-- Exclude Spaces -->
          <label class="option-label" for="exclude-spaces">
            <input
              type="checkbox"
              id="exclude-spaces"
              class="checkbox"
              aria-label="Exclude spaces from character count"
            />
            <span class="option-label__text">Exclude Spaces</span>
          </label>

          <!-- Set Character Limit -->
          <div class="option-limit-row">
            <label class="option-label" for="set-limit">
              <input
                type="checkbox"
                id="set-limit"
                class="checkbox"
                aria-label="Set a character limit"
              />
              <span class="option-label__text">Set Character Limit</span>
            </label>
            <input
              type="number"
              id="limit-value"
              class="limit-input"
              min="1"
              placeholder="e.g. 200"
              aria-label="Character limit value"
              hidden
            />
          </div>
        </div>

        <!-- Reading time -->
        <p class="reading-time">
          Approx. reading time:&nbsp;<span id="reading-time-value">&lt;1 minute</span>
        </p>
      </div>

      <!-- ====== STAT CARDS ====== -->
      <section class="cards" aria-label="Text statistics">
        <!-- Total Characters -->
        <div class="card card--purple">
          <div class="card__content">
            <span id="char-count" class="card__number">00</span>
            <span class="card__label">Total Characters</span>
          </div>
          <img
            src="assets/shapes/Shape-01.svg"
            alt=""
            aria-hidden="true"
            class="card__shape"
          />
        </div>

        <!-- Word Count -->
        <div class="card card--amber">
          <div class="card__content">
            <span id="word-count" class="card__number">00</span>
            <span class="card__label">Word Count</span>
          </div>
          <img
            src="assets/shapes/Shape-02.svg"
            alt=""
            aria-hidden="true"
            class="card__shape"
          />
        </div>

        <!-- Sentence Count -->
        <div class="card card--coral">
          <div class="card__content">
            <span id="sentence-count" class="card__number">00</span>
            <span class="card__label">Sentence Count</span>
          </div>
          <img
            src="assets/shapes/Shape-03.svg"
            alt=""
            aria-hidden="true"
            class="card__shape"
          />
        </div>
      </section>

      <!-- ====== LETTER DENSITY ====== -->
      <section class="density" aria-label="Letter density">
        <h2 class="density__heading">Letter Density</h2>
        <ul id="density-list" class="density__list" aria-live="polite"></ul>
        <div id="density-empty" class="density__empty" hidden>
          No characters found. Start typing to see letter density.
        </div>
        <button
          id="see-more-btn"
          class="see-more-btn"
          aria-expanded="false"
          hidden
        >
          <span class="see-more-btn__label">See more</span>
          <svg
            class="see-more-btn__chevron"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M4 6L8 10L12 6"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
